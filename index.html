<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && (descriptor.get || !descriptor.writable)) {
            const nativeFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              value: nativeFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // If defineProperty fails, we might be in a non-configurable state
          // but we can try to at least log it or provide a fallback if possible
          console.warn('Could not make window.fetch writable:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
